modules:
  - type: dnf
    source: local
    repos:
      - COPR kylegospo/rom-properties
      - COPR fiftydinar/gnome-randr-rust
      - COPR elxreno/zsync
      - COPR decathorpe/miniaturo
      - COPR hyperreal/better_fonts
      - COPR secureblue/hardened-chromium
    remove:
      - tuned
      - tuned-ppd
      - firefox
      - firefox-langpacks
      - gnome-tour
      - gnome-initial-setup
      - gnome-system-monitor
      - gnome-shell-extension-apps-menu
      - gnome-shell-extension-background-logo
      - gnome-shell-extension-launch-new-instance
      - gnome-shell-extension-places-menu
      - gnome-shell-extension-window-list
      - gnome-classic-session
    install:
      - rom-properties-gtk3
      - nautilus-python
      - python3-icoextract
      - gnome-randr-rust
      - langpacks-en
      - zsync
      - miniaturo
      - printer-driver-brlaser
      - epson-inkjet-printer-escpr
      - epson-inkjet-printer-escpr2
      - hplip
      - foo2zjs
      - uld
      - sg3_utils
      - rar
      - pandoc
      - power-profiles-daemon
      - fontconfig-font-replacements
      - hardened-chromium
      - hardened-chromium-subresource-filter

  # Workaround needed dependency faad2 for dr14_t.meter package
  - type: script
    snippets:
      - "dnf -y install https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm"
      - "dnf -y install faad2"
      - "dnf -y remove rpmfusion-free-release"
      - "dnf -y copr enable sassam/dr14_tmeter"
      - "dnf -y install dr14_t.meter"
